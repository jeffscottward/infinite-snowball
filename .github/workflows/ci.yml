name: Infinite Snowball CI

on:
  pull_request:

permissions: {}

jobs:
  lockfile:
    name: lockfile
    runs-on: ubuntu-24.04
    permissions: { contents: read }
    steps:
      - name: Check out the repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Select the audited Node release
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "22.13.1"
      - name: Install the audited pnpm release
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320
        with:
          version: "11.13.0"
          run_install: false
      - name: Verify the frozen lock and reviewed lifecycle policy
        run: |
          pnpm install --frozen-lockfile
          test "$(pnpm config get strict-dep-builds)" = "true"
          grep -q "^allowBuilds:" pnpm-workspace.yaml
          test -s tests/fixtures/meta/dependency-snapshot.json
          pnpm run test:workspace --testNamePattern "dependency snapshot and lifecycle policy"

  types:
    name: types
    runs-on: ubuntu-24.04
    permissions: { contents: read }
    steps:
      - name: Check out the repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Select the audited Node release
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "22.13.1"
      - name: Install the audited pnpm release
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320
        with:
          version: "11.13.0"
          run_install: false
      - name: Install exact dependencies
        run: pnpm install --frozen-lockfile
      - name: Type-check the owned test and tool surfaces
        run: pnpm tsc -p tests/meta/tsconfig.json --noEmit

  unit:
    name: unit
    runs-on: ubuntu-24.04
    permissions: { contents: read }
    steps:
      - name: Check out the repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Select the audited Node release
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "22.13.1"
      - name: Install the audited pnpm release
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320
        with:
          version: "11.13.0"
          run_install: false
      - name: Install exact dependencies
        run: pnpm install --frozen-lockfile
      - name: Run the unit and meta contracts
        run: pnpm run unit

  build:
    name: build
    runs-on: ubuntu-24.04
    permissions: { contents: read }
    steps:
      - name: Check out the repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Select the audited Node release
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "22.13.1"
      - name: Install the audited pnpm release
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320
        with:
          version: "11.13.0"
          run_install: false
      - name: Install exact dependencies
        run: pnpm install --frozen-lockfile
      - name: Build the current owned surfaces
        run: pnpm run build

  content-policy:
    name: content-policy
    runs-on: ubuntu-24.04
    permissions: { contents: read }
    steps:
      - name: Check out the repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Select the audited Node release
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "22.13.1"
      - name: Install the audited pnpm release
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320
        with:
          version: "11.13.0"
          run_install: false
      - name: Install exact dependencies
        run: pnpm install --frozen-lockfile
      - name: Run the pre-protocol content-policy contract
        run: pnpm run test:content-policy-contract

  license-provenance:
    name: license-provenance
    runs-on: ubuntu-24.04
    permissions: { contents: read }
    steps:
      - name: Check out the repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Select the audited Node release
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "22.13.1"
      - name: Install the audited pnpm release
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320
        with:
          version: "11.13.0"
          run_install: false
      - name: Install exact dependencies
        run: pnpm install --frozen-lockfile
      - name: Run the dependency license-provenance contract
        run: pnpm run test:license-provenance-contract

  package-pack:
    name: package-pack
    runs-on: ubuntu-24.04
    permissions: { contents: read }
    steps:
      - name: Check out the repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Select the audited Node release
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "22.13.1"
      - name: Install the audited pnpm release
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320
        with:
          version: "11.13.0"
          run_install: false
      - name: Install exact dependencies
        run: pnpm install --frozen-lockfile
      - name: Dry-run the current private root package
        run: pnpm pack --dry-run

  e2e-offline:
    name: e2e-offline
    runs-on: ubuntu-24.04
    permissions: { contents: read }
    steps:
      - name: Check out the repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Select the audited Node release
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "22.13.1"
      - name: Install the audited pnpm release
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320
        with:
          version: "11.13.0"
          run_install: false
      - name: Install exact dependencies
        run: pnpm install --frozen-lockfile
      - name: Verify the offline E2E harness contract
        run: pnpm run test:e2e-offline-config

  dependency-review:
    name: dependency-review
    runs-on: ubuntu-24.04
    permissions: { contents: read, pull-requests: read }
    steps:
      - name: Review dependency changes
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48

  codeql:
    name: codeql
    runs-on: ubuntu-24.04
    permissions: { actions: read, contents: read, security-events: write }
    steps:
      - name: Check out the repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Initialize CodeQL
        uses: github/codeql-action/init@e5d2f324924c57b6cabef9bdd7a1c85d62a89be2
        with:
          languages: javascript-typescript
          build-mode: none
      - name: Analyze with CodeQL
        uses: github/codeql-action/analyze@e5d2f324924c57b6cabef9bdd7a1c85d62a89be2

  secret-scan:
    name: secret-scan
    runs-on: ubuntu-24.04
    permissions: { contents: read }
    steps:
      - name: Check out the complete repository history
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
      - name: Scan committed history for secrets
        uses: trufflesecurity/trufflehog@27b0417c16317ca9a472a9a8092acce143b49c55
